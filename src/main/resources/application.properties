# App config
spring.application.name=student-api
server.port=8080

# Database config
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:studentdb}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Actuator - Prometheus ke liye
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
```

**Kuch important cheezein samajh le:**

`${DB_HOST:localhost}` — yeh syntax DevOps ke liye bahut important hai. Matlab:
```
Pehle environment variable DB_HOST dekho
Nahi mila toh default use karo: localhost
```

Yahi cheez app ko flexible banati hai:
```
Local machine pe  → localhost use hoga
Docker mein       → DB_HOST=mysql-container hoga
Kubernetes mein   → DB_HOST=mysql-service hoga
